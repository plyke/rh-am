name: Daily Riigihanked Monitor

on:
  workflow_dispatch:      # triggered by external cron job via GitHub API

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run procurement check
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python check_hanked.py

      - name: Keep workflow alive
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          date -u +"%Y-%m-%dT%H:%M:%SZ" > last_run.txt
          git add last_run.txt
          git commit -m "chore: daily run $(date -u +'%Y-%m-%d')" || true
          git push
